<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeWilder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100dvh; display: flex; flex-direction: column; }
  nav { padding: 8px 12px; border-bottom: 1px solid #ccc; display: flex; gap: 12px; align-items: center; }
  nav strong { margin-right: auto; }
  nav a { text-decoration: none; color: #333; font-size: 0.9rem; }
  #map { flex: 1; }
  #view-nearby-btn { position: absolute; bottom: 16px; left: 16px; right: 16px; z-index: 900; padding: 12px; font-size: 1rem; cursor: pointer; }

  #welcome-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 2000;
    display: flex; align-items: center; justify-content: center;
  }
  #welcome-modal {
    background: #fff;
    border: 1px solid #ccc;
    padding: 24px;
    max-width: 320px;
    width: 90%;
    border-radius: 6px;
  }
  #welcome-modal h2 { margin-bottom: 8px; }
  #welcome-modal p  { font-size: 0.9rem; color: #444; margin-bottom: 16px; line-height: 1.5; }
  #welcome-modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  #welcome-modal button { padding: 8px 14px; cursor: pointer; font-size: 0.85rem; }
  #welcome-start { background: #333; color: #fff; border: none; border-radius: 3px; }
  #welcome-skip  { background: none; border: 1px solid #ccc; border-radius: 3px; }

  .tooltip {
    position: absolute;
    z-index: 1500;
    background: #333;
    color: #fff;
    font-size: 0.78rem;
    padding: 8px 12px;
    border-radius: 4px;
    max-width: 200px;
    line-height: 1.4;
    pointer-events: none;
  }
  .tooltip::after {
    content: '';
    position: absolute;
    border: 6px solid transparent;
  }
  .tooltip.below::after  { top: -12px; left: 50%; transform: translateX(-50%); border-bottom-color: #333; }
  .tooltip.above::after  { bottom: -12px; left: 50%; transform: translateX(-50%); border-top-color: #333; }
  .tooltip.left::after   { right: -12px; top: 50%; transform: translateY(-50%); border-left-color: #333; }

  #walkthrough-bar {
    position: fixed;
    bottom: 70px; left: 16px; right: 16px;
    z-index: 1600;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 10px 14px;
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
  }
  #walkthrough-bar.active { display: flex; }
  #wt-text { flex: 1; color: #333; }
  #wt-next { padding: 6px 12px; cursor: pointer; background: #333; color: #fff; border: none; border-radius: 3px; font-size: 0.8rem; }
  #wt-skip { padding: 6px 10px; cursor: pointer; background: none; border: 1px solid #ccc; border-radius: 3px; font-size: 0.8rem; }
  #wt-progress { font-size: 0.75rem; color: #999; white-space: nowrap; }

  #hint-toggle {
    position: fixed;
    top: 52px; right: 8px;
    z-index: 1000;
    font-size: 0.7rem;
    padding: 4px 8px;
    cursor: pointer;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 3px;
    display: none;
  }
</style>
</head>
<body>

<nav>
  <strong><a href="/home">BeWilder</a></strong>
  <a href="/home" id="nav-home">Home</a>
  <a href="/plant-scan" id="nav-scan">Scan Plant</a>
  <a href="/plant-game" id="nav-berry">Berry Guess</a>
</nav>

<div id="map"></div>
<button id="view-nearby-btn">View Plants Nearby</button>

<button id="hint-toggle">💡 Hints</button>

<div id="welcome-overlay">
  <div id="welcome-modal">
    <h2>👋 Welcome to BeWilder</h2>
    <p>Discover plants growing near you. Tap any pin on the map to learn about a plant. You could also use the "Scan Plant" feature in the nav bar.</p>
    <div class="btn-row">
      <button id="welcome-skip">Skip</button>
      <button id="welcome-start">Show me around</button>
    </div>
  </div>
</div>

<div id="walkthrough-bar">
  <span id="wt-text"></span>
  <span id="wt-progress"></span>
  <button id="wt-skip">Skip</button>
  <button id="wt-next">Next</button>
</div>

<div class="tooltip" id="tooltip" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

const isFirstVisit = !localStorage.getItem('BeWilder_visited');

const PLANTS = [
  { id:1, name:"Stinging Nettle",  sci:"Urtica dioica",        emoji:"🌿", tags:["In Season","Edible"] },
  { id:2, name:"Wild Blackberry",  sci:"Rubus allegheniensis", emoji:"🫐", tags:["In Season","Edible"] },
  { id:3, name:"Bracken Fern",     sci:"Pteridium aquilinum",  emoji:"🌱", tags:["Out of Season"] },
  { id:4, name:"Garlic Mustard",   sci:"Alliaria petiolata",   emoji:"🌼", tags:["In Season","Edible"] },
  { id:5, name:"Trillium",         sci:"Trillium ovatum",      emoji:"🌸", tags:["In Season","Rare"] },
  { id:6, name:"Sword Fern",       sci:"Polystichum munitum",  emoji:"🌿", tags:["In Season"] },
  { id:7, name:"Cow Parsnip",      sci:"Heracleum maximum",    emoji:"🌾", tags:["Out of Season"] },
];

const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19,
}).addTo(map);

let userCenter = [49.2827, -123.1207];
map.setView(userCenter, 14);

function seedPlants(lat, lng) {
  PLANTS.forEach((plant, i) => {
    const angle = (i / PLANTS.length) * 2 * Math.PI + Math.random() * 0.5;
    const r = 0.004 + Math.random() * 0.010;
    const plat = lat + Math.cos(angle) * r;
    const plng = lng + Math.sin(angle) * r * 1.4;
    const popup = `<b>${plant.emoji} ${plant.name}</b><br><i>${plant.sci}</i><br>${plant.tags.join(' · ')}`;
    L.marker([plat, plng]).addTo(map).bindPopup(popup);
  });
}

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    userCenter = [pos.coords.latitude, pos.coords.longitude];
    map.setView(userCenter, 15);
    seedPlants(...userCenter);
  }, () => seedPlants(...userCenter));
} else {
  seedPlants(...userCenter);
}

const steps = [
  {
    text: "These pins show plants spotted near you. Tap one to learn more.",
    target: null,
    position: { bottom: '140px', left: '50%', transform: 'translateX(-50%)' },
  },
  {
    text: "Use 'Scan Plant' to identify a plant using your camera.",
    targetId: 'nav-scan',
    arrowDir: 'below',
  },
  {
    text: "'View Plants Nearby' will open a list of plants close to you.",
    targetId: 'view-nearby-btn',
    arrowDir: 'above',
  },
  {
    text: "That's it! You are ready to explore.",
    target: null,
    position: { bottom: '140px', left: '50%', transform: 'translateX(-50%)' },
  },
];

let currentStep = 0;
const wtBar   = document.getElementById('walkthrough-bar');
const wtText  = document.getElementById('wt-text');
const wtProg  = document.getElementById('wt-progress');
const wtNext  = document.getElementById('wt-next');
const wtSkip  = document.getElementById('wt-skip');

function showStep(i) {
  if (i >= steps.length) { endWalkthrough(); return; }
  const step = steps[i];
  wtText.textContent = step.text;
  wtProg.textContent = `${i + 1} / ${steps.length}`;
  wtNext.textContent = i === steps.length - 1 ? 'Done' : 'Next';
}

function endWalkthrough() {
  wtBar.classList.remove('active');
  localStorage.setItem('BeWilder_visited', '1');
  document.getElementById('hint-toggle').style.display = 'block';
}

function startWalkthrough() {
  currentStep = 0;
  wtBar.classList.add('active');
  showStep(0);
}

wtNext.addEventListener('click', () => { currentStep++; showStep(currentStep); });
wtSkip.addEventListener('click', endWalkthrough);

const overlay = document.getElementById('welcome-overlay');

if (!isFirstVisit) {
  overlay.style.display = 'none';
  document.getElementById('hint-toggle').style.display = 'block';
}

document.getElementById('welcome-start').addEventListener('click', () => {
  overlay.style.display = 'none';
  startWalkthrough();
});

document.getElementById('welcome-skip').addEventListener('click', () => {
  overlay.style.display = 'none';
  localStorage.setItem('BeWilder_visited', '1');
  document.getElementById('hint-toggle').style.display = 'block';
});

document.getElementById('hint-toggle').addEventListener('click', () => {
  startWalkthrough();
});
</script>
</body>
</html>
