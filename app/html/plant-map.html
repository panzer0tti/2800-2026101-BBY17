<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeWilder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { height: 100dvh; display: flex; flex-direction: column; }
  nav { padding: 8px 12px; border-bottom: 1px solid #ccc; display: flex; gap: 12px; align-items: center; }
  nav strong { margin-right: auto; }
  nav a { text-decoration: none; color: #333; font-size: 0.9rem; }
  #map { flex: 1; }
  #view-nearby-btn { position: absolute; bottom: 16px; left: 16px; right: 16px; z-index: 900; padding: 12px; font-size: 1rem; cursor: pointer; }

  #loading {
    position: absolute;
    top: 52px; left: 50%; transform: translateX(-50%);
    z-index: 1000;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 6px 12px;
    font-size: 0.8rem;
    display: none;
    white-space: nowrap;
  }
  #error-banner {
    position: absolute;
    top: 52px; left: 16px; right: 16px;
    z-index: 1000;
    background: #fff3cd;
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 8px 12px;
    font-size: 0.8rem;
    display: none;
  }

  #welcome-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 2000;
    display: flex; align-items: center; justify-content: center;
  }
  #welcome-modal {
    background: #fff; border: 1px solid #ccc;
    padding: 24px; max-width: 320px; width: 90%; border-radius: 6px;
  }
  #welcome-modal h2 { margin-bottom: 8px; }
  #welcome-modal p  { font-size: 0.9rem; color: #444; margin-bottom: 16px; line-height: 1.5; }
  #welcome-modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  #welcome-modal button { padding: 8px 14px; cursor: pointer; font-size: 0.85rem; }
  #welcome-start { background: #333; color: #fff; border: none; border-radius: 3px; }
  #welcome-skip  { background: none; border: 1px solid #ccc; border-radius: 3px; }

  #walkthrough-bar {
    position: fixed; bottom: 70px; left: 16px; right: 16px;
    z-index: 1600; background: #fff; border: 1px solid #ccc;
    border-radius: 4px; padding: 10px 14px;
    display: none; align-items: center; gap: 10px; font-size: 0.85rem;
  }
  #walkthrough-bar.active { display: flex; }
  #wt-text { flex: 1; color: #333; }
  #wt-next { padding: 6px 12px; cursor: pointer; background: #333; color: #fff; border: none; border-radius: 3px; font-size: 0.8rem; }
  #wt-skip { padding: 6px 10px; cursor: pointer; background: none; border: 1px solid #ccc; border-radius: 3px; font-size: 0.8rem; }
  #wt-progress { font-size: 0.75rem; color: #999; white-space: nowrap; }

  #hint-toggle {
    position: fixed; top: 52px; right: 8px; z-index: 1000;
    font-size: 0.7rem; padding: 4px 8px; cursor: pointer;
    background: #fff; border: 1px solid #ccc; border-radius: 3px; display: none;
  }

  #drawer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 950;
    background: #fff;
    border-top: 1px solid #ccc;
    max-height: 60dvh;
    display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  #drawer.open { transform: translateY(0); }
  #drawer-header { padding: 10px 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  #drawer-close { background: none; border: none; font-size: 1rem; cursor: pointer; }
  #drawer-list { overflow-y: auto; }
  .drawer-item { padding: 10px 12px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; gap: 10px; align-items: center; }
  .drawer-item:hover { background: #f5f5f5; }
  .drawer-item img { width: 48px; height: 48px; object-fit: cover; border-radius: 3px; flex-shrink: 0; }
  .drawer-item-img-placeholder { width: 48px; height: 48px; background: #eee; border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
  .drawer-item-info { flex: 1; }
  .drawer-item-name { font-size: 0.9rem; font-weight: bold; }
  .drawer-item-sci { font-size: 0.75rem; color: #666; font-style: italic; }
  .drawer-item-date { font-size: 0.72rem; color: #999; margin-top: 2px; }
  #drawer-loading { padding: 16px; text-align: center; font-size: 0.85rem; color: #666; }
</style>
</head>
<body>

<nav>
  <strong>BeWilder</strong>
  <a href="#" id="nav-home">Home</a>
  <a href="#" id="nav-scan">Scan Plant</a>
  <a href="#" id="nav-berry">Berry Guess</a>
</nav>

<div id="map"></div>
<div id="loading">Finding plants nearby…</div>
<div id="error-banner"></div>
<button id="view-nearby-btn">View Plants Nearby</button>
<button id="hint-toggle">Guide</button>

<div id="drawer">
  <div id="drawer-header">
    <strong>Nearby Plants</strong>
    <button id="drawer-close">✕</button>
  </div>
  <div id="drawer-loading" style="display:none">Loading…</div>
  <div id="drawer-list"></div>
</div>

<div id="welcome-overlay">
  <div id="welcome-modal">
    <h2>Welcome to BeWilder</h2>
    <p>Discover plants growing near you. Tap any pin on the map to learn about a plant. You could also use the "Scan Plant" feature in the nav bar.</p>
    <div class="btn-row">
      <button id="welcome-skip">Skip</button>
      <button id="welcome-start">Show me around</button>
    </div>
  </div>
</div>

<div id="walkthrough-bar">
  <span id="wt-text"></span>
  <span id="wt-progress"></span>
  <button id="wt-skip">Skip</button>
  <button id="wt-next">Next</button>
</div>

<script>
const isFirstVisit = !localStorage.getItem('BeWilder_visited');

// ── MAP ──
const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19,
}).addTo(map);

let userCenter = [49.2827, -123.1207];
map.setView(userCenter, 14);

let allObservations = [];

async function loadPlants(lat, lng) {
  const loading     = document.getElementById('loading');
  const errorBanner = document.getElementById('error-banner');
  loading.style.display = 'block';
  errorBanner.style.display = 'none';
  allObservations = [];

  const params = new URLSearchParams({
    taxon_id:      47126,
    lat,
    lng,
    radius:        2,
    per_page:      100,
    quality_grade: 'research',
    photos:        true,
  });

  try {
    const res  = await fetch(`https://api.inaturalist.org/v1/observations?${params}`);
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    const data = await res.json();

    if (!data.results.length) {
      showError('No plant sightings found nearby. Try moving the map to explore a different area.');
      loading.style.display = 'none';
      return;
    }

    allObservations = data.results;
    data.results.forEach(obs => addPin(obs));
    loading.style.display = 'none';

  } catch (err) {
    loading.style.display = 'none';
    showError('Could not load plant data. Check your connection and try again.');
    console.error('iNaturalist error:', err);
  }
}

function addPin(obs) {
  if (!obs.location) return;
  const [lat, lng] = obs.location.split(',').map(Number);

  const name  = obs.taxon?.preferred_common_name || obs.taxon?.name || 'Unknown Plant';
  const sci   = obs.taxon?.name || '';
  const date  = obs.observed_on || 'unknown date';
  const photo = obs.photos?.[0]?.url?.replace('square', 'small') || null;
  const url   = `https://www.inaturalist.org/observations/${obs.id}`;

  const popup = `
    ${photo ? `<img src="${photo}" width="160" style="display:block;margin-bottom:6px;border-radius:3px">` : ''}
    <b>${name}</b><br>
    <i style="font-size:0.8em">${sci}</i><br>
    <small>Spotted: ${date}</small><br>

  `;

  L.marker([lat, lng]).addTo(map).bindPopup(popup);
}

function showError(msg) {
  const banner = document.getElementById('error-banner');
  banner.textContent = msg;
  banner.style.display = 'block';
}

const drawer = document.getElementById('drawer');

function openDrawer() {
  drawer.classList.add('open');
  const list = document.getElementById('drawer-list');
  list.innerHTML = '';

  if (!allObservations.length) {
    list.innerHTML = '<div style="padding:16px;font-size:0.85rem;color:#666">No plants loaded yet. Wait for the map to finish loading.</div>';
    return;
  }

  allObservations.forEach(obs => {
    const name  = obs.taxon?.preferred_common_name || obs.taxon?.name || 'Unknown Plant';
    const sci   = obs.taxon?.name || '';
    const date  = obs.observed_on || 'unknown date';
    const photo = obs.photos?.[0]?.url || null;
    const url   = `https://www.inaturalist.org/observations/${obs.id}`;

    const item = document.createElement('div');
    item.className = 'drawer-item';
    item.innerHTML = `
      ${photo
        ? `<img src="${photo}" alt="${name}">`
        : `<div class="drawer-item-img-placeholder">🌿</div>`}
      <div class="drawer-item-info">
        <div class="drawer-item-name">${name}</div>
        <div class="drawer-item-sci">${sci}</div>
        <div class="drawer-item-date">Spotted: ${date}</div>
      </div>
    `;
    item.addEventListener('click', () => {
      if (!obs.location) return;
      const [lat, lng] = obs.location.split(',').map(Number);
      drawer.classList.remove('open');
      map.flyTo([lat, lng], 17, { duration: 1 });
    });
    list.appendChild(item);
  });
}

document.getElementById('view-nearby-btn').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', () => drawer.classList.remove('open'));

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    userCenter = [pos.coords.latitude, pos.coords.longitude];
    map.setView(userCenter, 15);

    L.circleMarker(userCenter, {
      radius: 10,
      fillColor: '#4285F4',
      fillOpacity: 1,
      color: '#fff',
      weight: 3,
    }).addTo(map).bindPopup('📍 You are here');

    loadPlants(...userCenter);
  }, () => {
    showError('Location unavailable. Showing plants near Vancouver.');
    loadPlants(...userCenter);
  });
} else {
  loadPlants(...userCenter);
}

map.on('moveend', () => {
  const c = map.getCenter();
  map.eachLayer(layer => { if (layer instanceof L.Marker) map.removeLayer(layer); });
  loadPlants(c.lat, c.lng);
});

const steps = [
  { text: "These pins show real plant sightings near you. Tap one to learn more." },
  { text: "Use 'Scan Plant' to identify a plant using your camera." },
  { text: "'View Plants Nearby' will open a list of plants close to you." },
  { text: "That's it! You are ready to explore." },
];

let currentStep = 0;
const wtBar  = document.getElementById('walkthrough-bar');
const wtText = document.getElementById('wt-text');
const wtProg = document.getElementById('wt-progress');
const wtNext = document.getElementById('wt-next');
const wtSkip = document.getElementById('wt-skip');

function showStep(i) {
  if (i >= steps.length) { endWalkthrough(); return; }
  wtText.textContent = steps[i].text;
  wtProg.textContent = `${i + 1} / ${steps.length}`;
  wtNext.textContent = i === steps.length - 1 ? 'Done' : 'Next';
}
function endWalkthrough() {
  wtBar.classList.remove('active');
  localStorage.setItem('BeWilder_visited', '1');
  document.getElementById('hint-toggle').style.display = 'block';
}
function startWalkthrough() {
  currentStep = 0;
  wtBar.classList.add('active');
  showStep(0);
}
wtNext.addEventListener('click', () => { currentStep++; showStep(currentStep); });
wtSkip.addEventListener('click', endWalkthrough);

const overlay = document.getElementById('welcome-overlay');
if (!isFirstVisit) {
  overlay.style.display = 'none';
  document.getElementById('hint-toggle').style.display = 'block';
}
document.getElementById('welcome-start').addEventListener('click', () => {
  overlay.style.display = 'none';
  startWalkthrough();
});
document.getElementById('welcome-skip').addEventListener('click', () => {
  overlay.style.display = 'none';
  localStorage.setItem('BeWilder_visited', '1');
  document.getElementById('hint-toggle').style.display = 'block';
});
document.getElementById('hint-toggle').addEventListener('click', startWalkthrough);
</script>
</body>
</html>
